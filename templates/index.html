<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jonathan Stocks | ניתוח מניות חכם</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;direction:rtl;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.header-right{margin-right:auto;display:flex;align-items:center;gap:16px}
.live-badge{background:#1a3a1e;color:var(--green);font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.clock{font-size:13px;color:var(--muted)}
.auto-refresh{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.refresh-bar{width:40px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.refresh-fill{height:100%;background:var(--blue);border-radius:2px;transition:width linear}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover{color:var(--text)}
.tab-count{font-size:11px;background:var(--bg3);padding:2px 7px;border-radius:10px;margin-right:6px}

/* MAIN */
.main{max-width:1300px;margin:0 auto;padding:1.5rem 1rem}

/* SEARCH */
.search-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.search-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-input-wrap{flex:1;min-width:220px;position:relative}
.search-row input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;direction:ltr;transition:border-color .2s}
.search-row input:focus{outline:none;border-color:var(--blue)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:#2ea043;transform:translateY(-1px)}
.btn-clear{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.btn-clear:hover{color:var(--text)}
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.preset-label{font-size:11px;color:var(--muted)}
.preset-btn{padding:5px 14px;background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.preset-btn:hover{border-color:var(--blue);color:var(--blue)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* MARKET MOOD */
.mood-bar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:1.5rem;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.mood-label{font-size:12px;color:var(--muted)}
.mood-track{flex:1;min-width:120px;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.mood-fill{height:100%;border-radius:4px;transition:width .8s}
.mood-text{font-size:13px;font-weight:600}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .25s;cursor:pointer;position:relative}
.card:hover{border-color:var(--blue);transform:translateY(-2px)}
.card.buy-card{border-top:3px solid var(--green)}
.card.sell-card{border-top:3px solid var(--red)}
.card.wait-card{border-top:3px solid var(--yellow)}
.card-score{position:absolute;top:12px;left:12px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid}
.card-header{padding:1rem 1.25rem .75rem;display:flex;justify-content:space-between;align-items:flex-start}
.ticker{font-size:21px;font-weight:700;color:var(--blue)}
.company{font-size:12px;color:var(--muted);margin-top:2px}
.sector-tag{display:inline-block;font-size:10px;background:var(--bg3);color:var(--muted);padding:2px 8px;border-radius:10px;margin-top:4px}
.badge{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700}
.badge-buy{background:#1a3a1e;color:var(--green)}
.badge-sell{background:#3a1a1a;color:var(--red)}
.badge-wait{background:#3a2e1a;color:var(--yellow)}
.price-row{padding:0 1.25rem .5rem;display:flex;align-items:baseline;gap:10px}
.price{font-size:26px;font-weight:700}
.chg{font-size:14px;font-weight:500}
.conf-wrap{padding:0 1.25rem .75rem}
.conf-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.conf-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;transition:width .6s}

/* CHART */
.chart-wrap{padding:0 1rem .75rem;height:80px;position:relative}

/* INDICATORS */
.inds{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bg3)}
.ind{background:var(--bg2);padding:10px 8px;text-align:center;cursor:pointer;transition:background .15s}
.ind:hover{background:#1c2128}
.ind-label{font-size:9px;color:var(--muted);margin-bottom:2px;display:flex;align-items:center;justify-content:center;gap:2px}
.ind-val{font-size:14px;font-weight:600}
.ind-sub{font-size:9px;color:var(--muted);margin-top:1px}
.info-i{font-size:9px;color:var(--blue);cursor:help}

/* LEVELS */
.levels{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bg3)}
.level{background:var(--bg2);padding:10px;text-align:center;cursor:pointer}
.level:hover{background:#1c2128}
.level-label{font-size:10px;color:var(--muted);margin-bottom:3px}
.level-val{font-size:13px;font-weight:600}

/* DIV BANNER */
.div-banner{margin:0 1rem .75rem;background:#0d2137;border:1px solid #1a4a6e;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:8px}

/* TOOLTIP */
.tooltip{position:fixed;background:#1c2128;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text);max-width:240px;z-index:999;pointer-events:none;display:none;direction:rtl;line-height:1.6}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center;padding:1rem}
.modal.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;direction:rtl}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem}
.modal-ticker{font-size:24px;font-weight:700;color:var(--blue)}
.modal-name{font-size:13px;color:var(--muted);margin-top:2px}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.modal-section{margin-bottom:1.25rem}
.modal-section h4{font-size:12px;color:var(--muted);margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--bg3);text-transform:uppercase;letter-spacing:.5px}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bg3);font-size:13px}
.modal-row:last-child{border:none}
.signal-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:13px}
.signal-item:last-child{border:none}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-modal{height:160px;position:relative;margin:8px 0}
.score-circle{width:60px;height:60px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.score-num{font-size:20px;font-weight:700;line-height:1}
.score-lbl{font-size:9px;color:var(--muted)}
.div-alert{background:#0d2137;border:1px solid #1a4a6e;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--blue);margin-top:8px}

.loading{text-align:center;padding:4rem;color:var(--muted);font-size:15px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:#3a1a1a;border:1px solid var(--red);border-radius:8px;padding:1rem;color:var(--red);margin-bottom:1rem;font-size:14px}
.empty{text-align:center;padding:4rem;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:1rem}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="logo-dot"></span>📈 Jonathan Stocks</div>
  <span style="font-size:12px;color:var(--muted)">ניתוח מניות חכם בזמן אמת</span>
  <div class="header-right">
    <span class="live-badge">● LIVE</span>
    <div class="auto-refresh">
      רענון אוטו
      <div class="refresh-bar"><div class="refresh-fill" id="refreshFill"></div></div>
    </div>
    <span class="clock" id="clock"></span>
  </div>
</div>

<div class="main">
  <div class="search-box">
    <div class="search-row">
      <div class="search-input-wrap">
        <input id="tickerInput" placeholder="הזן טיקרים — AAPL, TEVA, TSLA, NVDA..." />
      </div>
      <button class="btn btn-primary" onclick="analyze()">🔍 נתח עכשיו</button>
      <button class="btn btn-clear" onclick="clearAll()">נקה</button>
    </div>
    <div class="presets">
      <span class="preset-label">מהיר:</span>
      <button class="preset-btn" onclick="setPreset('AAPL,TSLA,NVDA,MSFT,TEVA')">🔥 פופולריות</button>
      <button class="preset-btn" onclick="setPreset('AAPL,GOOGL,META,AMZN,MSFT,NFLX,NVDA')">💻 טכנולוגיה</button>
      <button class="preset-btn" onclick="setPreset('TEVA,PFE,JNJ,ABBV,MRK')">💊 פארמה</button>
      <button class="preset-btn" onclick="setPreset('JPM,BAC,GS,V,MA')">🏦 פיננסים</button>
      <button class="preset-btn" onclick="setPreset('XOM,CVX,BP,COP')">⛽ אנרגיה</button>
    </div>
  </div>

  <div id="statsRow" class="stats-row" style="display:none">
    <div class="stat"><div class="stat-label">קנייה</div><div class="stat-val" style="color:var(--green)" id="sBuy">0</div></div>
    <div class="stat"><div class="stat-label">המתנה</div><div class="stat-val" style="color:var(--yellow)" id="sWait">0</div></div>
    <div class="stat"><div class="stat-label">מכירה</div><div class="stat-val" style="color:var(--red)" id="sSell">0</div></div>
    <div class="stat"><div class="stat-label">דיבידנד</div><div class="stat-val" style="color:var(--blue)" id="sDiv">0</div></div>
    <div class="stat"><div class="stat-label">סה"כ</div><div class="stat-val" id="sTotal">0</div></div>
  </div>

  <div id="moodBar" class="mood-bar" style="display:none">
    <span class="mood-label">סנטימנט שוק:</span>
    <div class="mood-track"><div class="mood-fill" id="moodFill"></div></div>
    <span class="mood-text" id="moodText"></span>
  </div>

  <div id="tabs" class="tabs" style="display:none">
    <div class="tab active" onclick="filterTab('all')" id="tab-all">הכל <span class="tab-count" id="tc-all">0</span></div>
    <div class="tab" onclick="filterTab('BUY')" id="tab-BUY">🟢 קנייה <span class="tab-count" id="tc-BUY">0</span></div>
    <div class="tab" onclick="filterTab('WAIT')" id="tab-WAIT">🟡 המתנה <span class="tab-count" id="tc-WAIT">0</span></div>
    <div class="tab" onclick="filterTab('SELL')" id="tab-SELL">🔴 מכירה <span class="tab-count" id="tc-SELL">0</span></div>
    <div class="tab" onclick="filterTab('DIV')" id="tab-DIV">💰 דיבידנד <span class="tab-count" id="tc-DIV">0</span></div>
  </div>

  <div id="output">
    <div class="empty">
      <div class="empty-icon">📊</div>
      <div>הזן טיקרים למעלה ולחץ נתח</div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
const TIPS={
  rsi:{t:'RSI — מדד עוצמה',b:'מתחת 30 = מכירת יתר (קנייה). מעל 70 = קניית יתר (מכירה). 50 = נייטרלי.'},
  macd:{t:'MACD — מגמה',b:'מעל קו האות = בולי. מתחת = דובי. צליבה = נקודת מפנה פוטנציאלית.'},
  atr:{t:'ATR — תנודתיות',b:'התזוזה היומית הממוצעת ב-14 יום. גבוה = סיכון גבוה, פוטנציאל גבוה.'},
  bb:{t:'Bollinger %B',b:'0% = ליד רצועה תחתונה. 100% = ליד עליונה. מעל 100% = פריצה.'},
  vol:{t:'מחזור יחסי',b:'כמה פעמים גדול מהממוצע. מעל 1.5x = עניין גבוה. מתחת 0.7x = אדישות.'},
  entry:{t:'מחיר כניסה',b:'המחיר הנוכחי לפיו מחושב הניתוח.'},
  target:{t:'יעד רווח',b:'מחיר כניסה + ATR×2. לא ערובה לרווח — רק יעד טכני.'},
  stop:{t:'Stop Loss',b:'נקודת עצירת הפסד: מחיר כניסה − ATR×1.5. חיוני לניהול סיכונים!'},
};

let results=[], activeTab='all', charts={}, autoTimer, refreshInterval=300;

function clock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(clock,1000);clock();

function startAutoRefresh(){
  clearInterval(autoTimer);
  let elapsed=0;
  const fill=document.getElementById('refreshFill');
  autoTimer=setInterval(()=>{
    elapsed++;
    if(fill) fill.style.width=(elapsed/refreshInterval*100)+'%';
    if(elapsed>=refreshInterval){
      elapsed=0;
      if(results.length) reAnalyze();
    }
  },1000);
}

function calcScore(r){
  let s=0;
  if(r.rsi<35)s+=2;else if(r.rsi<50)s+=1;else if(r.rsi>70)s-=2;else if(r.rsi>60)s-=1;
  if(r.macd==='BULLISH')s+=2;else s-=2;
  if(r.bb_pct<20)s+=1;else if(r.bb_pct>85)s-=1;
  if(r.vol_ratio>1.5)s+=1;
  if(r.dividend_yield>0.03)s+=1;
  return Math.min(10,Math.max(1,Math.round((s+6)/12*10)));
}

function showTip(e,k){
  const t=document.getElementById('tooltip'),i=TIPS[k];
  if(!i)return;
  t.innerHTML='<strong>'+i.t+'</strong><br>'+i.b;
  t.style.display='block';
  t.style.top=(e.clientY+14)+'px';
  t.style.left=Math.max(10,(e.clientX-120))+'px';
}
function hideTip(){document.getElementById('tooltip').style.display='none';}

async function analyze(){
  const raw=document.getElementById('tickerInput').value;
  const tickers=raw.split(/[,\s]+/).map(t=>t.trim().toUpperCase()).filter(Boolean);
  if(!tickers.length)return;
  results=[];
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  charts={};
  document.getElementById('output').innerHTML='<div class="loading"><span class="spinner"></span> שולף נתונים חיים מהשוק...</div>';
  document.getElementById('statsRow').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('moodBar').style.display='none';
  for(const ticker of tickers){
    try{
      const res=await fetch('/api/stock/'+ticker);
      const data=await res.json();
      if(data.error)document.getElementById('output').innerHTML+=`<div class="error-msg">שגיאה ב-${ticker}: ${data.error}</div>`;
      else{data.score=calcScore(data);results.push(data);}
    }catch(e){document.getElementById('output').innerHTML+=`<div class="error-msg">לא ניתן לטעון ${ticker}</div>`;}
  }
  renderAll();
  startAutoRefresh();
}

async function reAnalyze(){
  const tickers=results.map(r=>r.ticker);
  results=[];
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  charts={};
  for(const ticker of tickers){
    try{
      const res=await fetch('/api/stock/'+ticker);
      const data=await res.json();
      if(!data.error){data.score=calcScore(data);results.push(data);}
    }catch(e){}
  }
  renderAll();
}

function setPreset(v){document.getElementById('tickerInput').value=v;analyze();}
function clearAll(){results=[];document.getElementById('tickerInput').value='';document.getElementById('output').innerHTML='<div class="empty"><div class="empty-icon">📊</div><div>הזן טיקרים למעלה ולחץ נתח</div></div>';document.getElementById('statsRow').style.display='none';document.getElementById('tabs').style.display='none';document.getElementById('moodBar').style.display='none';clearInterval(autoTimer);}

function filterTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  renderCards();
}

function renderAll(){
  const buy=results.filter(r=>r.rec==='BUY').length;
  const wait=results.filter(r=>r.rec==='WAIT').length;
  const sell=results.filter(r=>r.rec==='SELL').length;
  const div=results.filter(r=>r.dividend_yield>0).length;
  document.getElementById('sBuy').textContent=buy;
  document.getElementById('sWait').textContent=wait;
  document.getElementById('sSell').textContent=sell;
  document.getElementById('sDiv').textContent=div;
  document.getElementById('sTotal').textContent=results.length;
  document.getElementById('tc-all').textContent=results.length;
  document.getElementById('tc-BUY').textContent=buy;
  document.getElementById('tc-WAIT').textContent=wait;
  document.getElementById('tc-SELL').textContent=sell;
  document.getElementById('tc-DIV').textContent=div;
  if(results.length){
    document.getElementById('statsRow').style.display='grid';
    document.getElementById('tabs').style.display='flex';
    const mood=Math.round(buy/(results.length)*100);
    const moodFill=document.getElementById('moodFill');
    const moodText=document.getElementById('moodText');
    moodFill.style.width=mood+'%';
    moodFill.style.background=mood>60?'#3fb950':mood>40?'#d29922':'#f85149';
    moodText.textContent=mood>60?'🟢 שורי '+mood+'%':mood>40?'🟡 נייטרלי '+mood+'%':'🔴 דובי '+mood+'%';
    moodText.style.color=mood>60?'#3fb950':mood>40?'#d29922':'#f85149';
    document.getElementById('moodBar').style.display='flex';
  }
  renderCards();
}

function renderCards(){
  let filtered=activeTab==='all'?results:activeTab==='DIV'?results.filter(r=>r.dividend_yield>0):results.filter(r=>r.rec===activeTab);
  filtered=[...filtered].sort((a,b)=>b.conf-a.conf);
  if(!filtered.length){document.getElementById('output').innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>אין מניות בקטגוריה זו</div></div>';return;}
  document.getElementById('output').innerHTML='<div class="cards">'+filtered.map(cardHTML).join('')+'</div>';
  setTimeout(()=>filtered.forEach(r=>drawMiniChart(r)),100);
}

function cardHTML(r){
  const rc=r.rec==='BUY'?'buy':r.rec==='SELL'?'sell':'wait';
  const rl=r.rec==='BUY'?'🟢 קנייה':r.rec==='SELL'?'🔴 מכירה':'🟡 המתנה';
  const cc=r.conf>=70?'#3fb950':r.conf>=50?'#d29922':'#f85149';
  const sc=r.score>=7?'#3fb950':r.score>=5?'#d29922':'#f85149';
  const chgC=r.chg>=0?'var(--green)':'var(--red)';
  const rsiC=r.rsi>70?'var(--red)':r.rsi<35?'var(--green)':'var(--text)';
  const macdC=r.macd==='BULLISH'?'var(--green)':'var(--red)';
  const up=((r.target-r.price)/r.price*100).toFixed(1);
  const dn=((r.price-r.stop)/r.price*100).toFixed(1);
  const divHTML=r.dividend_yield>0?`<div class="div-banner">💰 דיבידנד: ${(r.dividend_yield*100).toFixed(2)}% ${r.ex_dividend_date?'| Ex-Date: '+r.ex_dividend_date:''}</div>`:'';
  return `
  <div class="card ${rc}-card" onclick="openDetail(${JSON.stringify(r).replace(/"/g,'&quot;')})">
    <div class="card-score" style="color:${sc};border-color:${sc}">${r.score}<div style="font-size:8px;color:var(--muted)">ציון</div></div>
    <div class="card-header">
      <div>
        <div class="ticker">${r.ticker}</div>
        <div class="company">${r.name}</div>
        <span class="sector-tag">${r.sector}</span>
      </div>
      <span class="badge badge-${rc}">${rl}</span>
    </div>
    <div class="price-row">
      <span class="price">$${r.price.toFixed(2)}</span>
      <span class="chg" style="color:${chgC}">${r.chg>=0?'+':''}${r.chg.toFixed(2)}%</span>
    </div>
    <div class="conf-wrap">
      <div class="conf-label"><span>ביטחון AI</span><span>${r.conf}%</span></div>
      <div class="conf-bar"><div class="conf-fill" style="width:${r.conf}%;background:${cc}"></div></div>
    </div>
    <div class="chart-wrap"><canvas id="chart-${r.ticker}" height="80"></canvas></div>
    ${divHTML}
    <div class="inds">
      <div class="ind" onmouseenter="showTip(event,'rsi')" onmouseleave="hideTip()">
        <div class="ind-label">RSI <span class="info-i">?</span></div>
        <div class="ind-val" style="color:${rsiC}">${r.rsi}</div>
        <div class="ind-sub">${r.rsi>70?'קניית יתר':r.rsi<35?'מכירת יתר':'נייטרלי'}</div>
      </div>
      <div class="ind" onmouseenter="showTip(event,'macd')" onmouseleave="hideTip()">
        <div class="ind-label">MACD <span class="info-i">?</span></div>
        <div class="ind-val" style="color:${macdC}">${r.macd==='BULLISH'?'בולי ↑':'דובי ↓'}</div>
        <div class="ind-sub">מומנטום</div>
      </div>
      <div class="ind" onmouseenter="showTip(event,'atr')" onmouseleave="hideTip()">
        <div class="ind-label">ATR <span class="info-i">?</span></div>
        <div class="ind-val">${r.atr_pct}%</div>
        <div class="ind-sub">${r.atr_pct>3?'תנודתי':'יציב'}</div>
      </div>
      <div class="ind" onmouseenter="showTip(event,'bb')" onmouseleave="hideTip()">
        <div class="ind-label">BB% <span class="info-i">?</span></div>
        <div class="ind-val">${r.bb_pct}%</div>
        <div class="ind-sub">${r.bb_pct>85?'שיא':r.bb_pct<15?'תחתית':'אמצע'}</div>
      </div>
      <div class="ind" onmouseenter="showTip(event,'vol')" onmouseleave="hideTip()">
        <div class="ind-label">מחזור <span class="info-i">?</span></div>
        <div class="ind-val">${r.vol_ratio}x</div>
        <div class="ind-sub">${r.vol_ratio>1.5?'גבוה':r.vol_ratio<0.7?'נמוך':'רגיל'}</div>
      </div>
      <div class="ind">
        <div class="ind-label">פוטנציאל</div>
        <div class="ind-val" style="color:var(--green)">+${up}%</div>
        <div class="ind-sub">R:R 1:1.3</div>
      </div>
    </div>
    <div class="levels">
      <div class="level" onmouseenter="showTip(event,'entry')" onmouseleave="hideTip()">
        <div class="level-label">כניסה <span class="info-i">?</span></div>
        <div class="level-val" style="color:var(--blue)">$${r.entry.toFixed(2)}</div>
      </div>
      <div class="level" onmouseenter="showTip(event,'target')" onmouseleave="hideTip()">
        <div class="level-label">יעד (+${up}%) <span class="info-i">?</span></div>
        <div class="level-val" style="color:var(--green)">$${r.target.toFixed(2)}</div>
      </div>
      <div class="level" onmouseenter="showTip(event,'stop')" onmouseleave="hideTip()">
        <div class="level-label">Stop (-${dn}%) <span class="info-i">?</span></div>
        <div class="level-val" style="color:var(--red)">$${r.stop.toFixed(2)}</div>
      </div>
    </div>
  </div>`;
}

function drawMiniChart(r){
  const canvas=document.getElementById('chart-'+r.ticker);
  if(!canvas||!r.history)return;
  const prices=r.history;
  const color=prices[prices.length-1]>=prices[0]?'#3fb950':'#f85149';
  if(charts[r.ticker])try{charts[r.ticker].destroy()}catch(e){}
  charts[r.ticker]=new Chart(canvas,{
    type:'line',
    data:{labels:prices.map((_,i)=>i),datasets:[{data:prices,borderColor:color,borderWidth:1.5,fill:true,backgroundColor:color+'22',pointRadius:0,tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:600}}
  });
}

function openDetail(r){
  if(typeof r==='string')r=JSON.parse(r.replace(/&quot;/g,'"'));
  const rl=r.rec==='BUY'?'🟢 קנייה':r.rec==='SELL'?'🔴 מכירה':'🟡 המתנה';
  const up=((r.target-r.price)/r.price*100).toFixed(1);
  const dn=((r.price-r.stop)/r.price*100).toFixed(1);
  const divY=r.dividend_yield>0?(r.dividend_yield*100).toFixed(2)+'%':'אינה מחלקת';
  const sc=r.score>=7?'#3fb950':r.score>=5?'#d29922':'#f85149';
  const signals=[];
  if(r.rsi<35)signals.push({c:'#3fb950',t:'RSI נמוך — מכירת יתר, הזדמנות קנייה פוטנציאלית'});
  if(r.rsi>70)signals.push({c:'#f85149',t:'RSI גבוה — קניית יתר, שקול מימוש'});
  if(r.macd==='BULLISH')signals.push({c:'#3fb950',t:'MACD בולי — מומנטום עולה'});
  else signals.push({c:'#f85149',t:'MACD דובי — מומנטום יורד'});
  if(r.bb_pct<20)signals.push({c:'#3fb950',t:'מחיר ליד רצועת בולינגר התחתונה — זול יחסית'});
  if(r.bb_pct>85)signals.push({c:'#f85149',t:'מחיר ליד רצועת בולינגר העליונה — יקר יחסית'});
  if(r.vol_ratio>1.5)signals.push({c:'#d29922',t:'מחזור גבוה במיוחד — עניין מוסדי או חדשות'});
  if(r.dividend_yield>0.03)signals.push({c:'#58a6ff',t:'תשואת דיבידנד גבוהה — '+divY+' לשנה'});

  document.getElementById('modalBox').innerHTML=`
    <div class="modal-header">
      <div>
        <div style="display:flex;align-items:center;gap:12px">
          <div>
            <div class="modal-ticker">${r.ticker}</div>
            <div class="modal-name">${r.name} | ${r.sector}</div>
          </div>
          <div class="score-circle" style="color:${sc};border-color:${sc}">
            <div class="score-num">${r.score}</div>
            <div class="score-lbl">מתוך 10</div>
          </div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${r.history?`<div class="chart-modal"><canvas id="modal-chart"></canvas></div>`:''}
    <div class="modal-section">
      <h4>המלצה: ${rl} — ביטחון ${r.conf}%</h4>
      <div class="modal-row"><span>מחיר נוכחי</span><span style="font-weight:700;font-size:16px">$${r.price.toFixed(2)}</span></div>
      <div class="modal-row"><span>כניסה</span><span style="color:#58a6ff">$${r.entry.toFixed(2)}</span></div>
      <div class="modal-row"><span>יעד רווח</span><span style="color:#3fb950">$${r.target.toFixed(2)} <small>(+${up}%)</small></span></div>
      <div class="modal-row"><span>Stop Loss</span><span style="color:#f85149">$${r.stop.toFixed(2)} <small>(-${dn}%)</small></span></div>
      <div class="modal-row"><span>תמיכה</span><span>$${r.support.toFixed(2)}</span></div>
      <div class="modal-row"><span>התנגדות</span><span>$${r.resistance.toFixed(2)}</span></div>
    </div>
    <div class="modal-section">
      <h4>💰 דיבידנד</h4>
      <div class="modal-row"><span>תשואת דיבידנד שנתית</span><span style="color:#58a6ff;font-weight:600">${divY}</span></div>
      <div class="modal-row"><span>תאריך Ex-Dividend</span><span>${r.ex_dividend_date||'לא ידוע'}</span></div>
      ${r.dividend_yield>0?`<div class="div-alert">💡 כדי לקבל את הדיבידנד הבא, יש לרכוש את המניה לפני תאריך ה-Ex-Dividend</div>`:''}
    </div>
    <div class="modal-section">
      <h4>אינדיקטורים טכניים</h4>
      <div class="modal-row"><span>RSI</span><span style="color:${r.rsi>70?'#f85149':r.rsi<35?'#3fb950':'var(--text)'}">${r.rsi}</span></div>
      <div class="modal-row"><span>MACD</span><span style="color:${r.macd==='BULLISH'?'#3fb950':'#f85149'}">${r.macd==='BULLISH'?'בולי ↑':'דובי ↓'}</span></div>
      <div class="modal-row"><span>ATR%</span><span>${r.atr_pct}%</span></div>
      <div class="modal-row"><span>Bollinger %B</span><span>${r.bb_pct}%</span></div>
      <div class="modal-row"><span>מחזור יחסי</span><span>${r.vol_ratio}x</span></div>
    </div>
    <div class="modal-section">
      <h4>אותות מסחר</h4>
      ${signals.map(s=>`<div class="signal-item"><div class="sdot" style="background:${s.c}"></div><span>${s.t}</span></div>`).join('')}
    </div>
  `;
  document.getElementById('modal').classList.add('open');
  if(r.history){
    setTimeout(()=>{
      const mc=document.getElementById('modal-chart');
      if(!mc)return;
      const color=r.history[r.history.length-1]>=r.history[0]?'#3fb950':'#f85149';
      new Chart(mc,{type:'line',data:{labels:r.history.map((_,i)=>i),datasets:[{data:r.history,borderColor:color,borderWidth:2,fill:true,backgroundColor:color+'22',pointRadius:0,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}});
    },100);
  }
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
</script>
</body>
</html>
