<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנתח מניות AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; direction: rtl; }
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
  .header h1 { font-size: 20px; color: #58a6ff; }
  .header span { font-size: 13px; color: #8b949e; }
  .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
  .search-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
  .search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-row input { flex: 1; min-width: 200px; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 15px; }
  .search-row input:focus { outline: none; border-color: #58a6ff; }
  .search-row button { padding: 10px 24px; background: #238636; border: none; border-radius: 8px; color: white; font-size: 15px; cursor: pointer; font-weight: 600; }
  .search-row button:hover { background: #2ea043; }
  .btn-preset { background: #21262d !important; border: 1px solid #30363d !important; }
  .btn-preset:hover { background: #30363d !important; }
  .stats-row { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 12px 20px; min-width: 120px; }
  .stat-card .lbl { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
  .stat-card .val { font-size: 22px; font-weight: 700; }
  .buy-color { color: #3fb950; }
  .sell-color { color: #f85149; }
  .wait-color { color: #d29922; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.25rem; transition: border-color .2s; cursor: pointer; }
  .card:hover { border-color: #58a6ff; }
  .card.buy-card { border-right: 3px solid #3fb950; }
  .card.sell-card { border-right: 3px solid #f85149; }
  .card.wait-card { border-right: 3px solid #d29922; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .ticker { font-size: 20px; font-weight: 700; color: #58a6ff; }
  .company { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .rec-badge { padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .badge-buy { background: #1a3a1e; color: #3fb950; }
  .badge-sell { background: #3a1a1a; color: #f85149; }
  .badge-wait { background: #3a2e1a; color: #d29922; }
  .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .price { font-size: 26px; font-weight: 700; }
  .chg { font-size: 14px; }
  .chg.pos { color: #3fb950; }
  .chg.neg { color: #f85149; }
  .indicators { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .ind { background: #0d1117; border-radius: 8px; padding: 8px; text-align: center; }
  .ind-lbl { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
  .ind-val { font-size: 14px; font-weight: 600; }
  .levels { display: flex; justify-content: space-between; font-size: 13px; padding-top: 10px; border-top: 1px solid #21262d; }
  .level-item { text-align: center; }
  .level-lbl { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
  .level-val { font-weight: 600; }
  .conf-bar-wrap { margin: 10px 0; }
  .conf-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .conf-bar { height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; }
  .conf-fill { height: 100%; border-radius: 2px; }
  .loading { text-align: center; padding: 3rem; color: #8b949e; }
  .error-msg { background: #3a1a1a; border: 1px solid #f85149; border-radius: 8px; padding: 1rem; color: #f85149; margin-bottom: 1rem; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>📈 מנתח מניות AI</h1>
  <span>נתונים חיים מהשוק</span>
  <span id="clock" style="margin-right:auto;font-size:12px;color:#58a6ff"></span>
</div>

<div class="main">
  <div class="search-box">
    <div class="search-row">
      <input id="tickerInput" placeholder="הזן טיקר — AAPL, TEVA, TSLA..." />
      <button onclick="analyze()">🔍 נתח</button>
      <button class="btn-preset" onclick="loadPreset()">5 מניות לדוגמה</button>
    </div>
  </div>

  <div id="statsRow" class="stats-row" style="display:none">
    <div class="stat-card"><div class="lbl">קנייה</div><div class="val buy-color" id="sBuy">0</div></div>
    <div class="stat-card"><div class="lbl">המתנה</div><div class="val wait-color" id="sWait">0</div></div>
    <div class="stat-card"><div class="lbl">מכירה</div><div class="val sell-color" id="sSell">0</div></div>
    <div class="stat-card"><div class="lbl">סה"כ</div><div class="val" id="sTotal">0</div></div>
  </div>

  <div id="output"></div>
</div>

<script>
let results = [];

function clock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('he-IL');
}
setInterval(clock, 1000); clock();

async function fetchStock(ticker) {
  const res = await fetch('/api/stock/' + ticker.trim().toUpperCase());
  return await res.json();
}

async function analyze() {
  const raw = document.getElementById('tickerInput').value;
  const tickers = raw.split(/[,\s]+/).map(t => t.trim().toUpperCase()).filter(Boolean);
  if (!tickers.length) return;

  results = [];
  document.getElementById('output').innerHTML = '<div class="loading"><span class="spinner"></span> שולף נתונים חיים...</div>';
  document.getElementById('statsRow').style.display = 'none';

  for (const ticker of tickers) {
    try {
      const data = await fetchStock(ticker);
      if (data.error) {
        document.getElementById('output').innerHTML += `<div class="error-msg">שגיאה ב-${ticker}: ${data.error}</div>`;
      } else {
        results.push(data);
      }
    } catch(e) {
      document.getElementById('output').innerHTML += `<div class="error-msg">לא ניתן לטעון את ${ticker}</div>`;
    }
  }

  renderAll();
}

function loadPreset() {
  document.getElementById('tickerInput').value = 'AAPL, TSLA, NVDA, MSFT, TEVA';
  analyze();
}

function renderAll() {
  const buy = results.filter(r => r.rec === 'BUY').length;
  const wait = results.filter(r => r.rec === 'WAIT').length;
  const sell = results.filter(r => r.rec === 'SELL').length;

  document.getElementById('sBuy').textContent = buy;
  document.getElementById('sWait').textContent = wait;
  document.getElementById('sSell').textContent = sell;
  document.getElementById('sTotal').textContent = results.length;
  document.getElementById('statsRow').style.display = results.length ? 'flex' : 'none';

  const sorted = [...results].sort((a, b) => b.conf - a.conf);
  const html = '<div class="cards">' + sorted.map(r => cardHTML(r)).join('') + '</div>';
  document.getElementById('output').innerHTML = html;
}

function cardHTML(r) {
  const recClass = r.rec === 'BUY' ? 'buy' : r.rec === 'SELL' ? 'sell' : 'wait';
  const recLabel = r.rec === 'BUY' ? '🟢 קנייה' : r.rec === 'SELL' ? '🔴 מכירה' : '🟡 המתנה';
  const chgClass = r.chg >= 0 ? 'pos' : 'neg';
  const chgSign = r.chg >= 0 ? '+' : '';
  const confColor = r.conf >= 70 ? '#3fb950' : r.conf >= 50 ? '#d29922' : '#f85149';
  const rsiColor = r.rsi > 70 ? '#f85149' : r.rsi < 35 ? '#3fb950' : '#e6edf3';
  const macdColor = r.macd === 'BULLISH' ? '#3fb950' : '#f85149';
  const upside = ((r.target - r.price) / r.price * 100).toFixed(1);
  const downside = ((r.price - r.stop) / r.price * 100).toFixed(1);

  return `
    <div class="card ${recClass}-card">
      <div class="card-top">
        <div>
          <div class="ticker">${r.ticker}</div>
          <div class="company">${r.name}</div>
          <div style="font-size:11px;color:#8b949e;margin-top:2px">${r.sector}</div>
        </div>
        <span class="rec-badge badge-${recClass}">${recLabel}</span>
      </div>
      <div class="price-row">
        <span class="price">$${r.price.toFixed(2)}</span>
        <span class="chg ${chgClass}">${chgSign}${r.chg.toFixed(2)}%</span>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-label"><span>ביטחון</span><span>${r.conf}%</span></div>
        <div class="conf-bar"><div class="conf-fill" style="width:${r.conf}%;background:${confColor}"></div></div>
      </div>
      <div class="indicators">
        <div class="ind"><div class="ind-lbl">RSI</div><div class="ind-val" style="color:${rsiColor}">${r.rsi}</div></div>
        <div class="ind"><div class="ind-lbl">MACD</div><div class="ind-val" style="color:${macdColor}">${r.macd === 'BULLISH' ? 'בולי ↑' : 'דובי ↓'}</div></div>
        <div class="ind"><div class="ind-lbl">ATR%</div><div class="ind-val">${r.atr_pct}%</div></div>
        <div class="ind"><div class="ind-lbl">BB%</div><div class="ind-val">${r.bb_pct}%</div></div>
        <div class="ind"><div class="ind-lbl">מחזור×</div><div class="ind-val">${r.vol_ratio}x</div></div>
        <div class="ind"><div class="ind-lbl">R:R</div><div class="ind-val">1:1.3</div></div>
      </div>
      <div class="levels">
        <div class="level-item"><div class="level-lbl">כניסה</div><div class="level-val" style="color:#58a6ff">$${r.entry.toFixed(2)}</div></div>
        <div class="level-item"><div class="level-lbl">יעד (+${upside}%)</div><div class="level-val" style="color:#3fb950">$${r.target.toFixed(2)}</div></div>
        <div class="level-item"><div class="level-lbl">Stop (-${downside}%)</div><div class="level-val" style="color:#f85149">$${r.stop.toFixed(2)}</div></div>
      </div>
    </div>`;
}
</script>
</body>
</html>
